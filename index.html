<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- ===== Mobile dispatch =====================================================
     On phones/tablets, serve the self-contained mobile experience (mobile.html)
     at this SAME url with no redirect. Runs as the first thing in <head>, so on
     mobile the document is replaced BEFORE the desktop styles/scripts below ever
     parse — the desktop code path is never touched. On desktop this is a no-op.
     Append ?desktop=1 to force the desktop layout (useful for testing). -->
<script>
(function () {
  try {
    var forceDesktop = /[?&]desktop=1\b/.test(location.search);
    var isMobile = !forceDesktop && (
      window.matchMedia('(max-width: 820px)').matches ||
      /Mobi|Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent)
    );
    if (!isMobile) return;                    // desktop → fall through to the PC app, untouched
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'mobile.html', false);    // synchronous: completes before the rest of <head> parses
    xhr.send();
    if (xhr.status >= 200 && xhr.status < 400 && xhr.responseText) {
      document.open();
      document.write(xhr.responseText);
      document.close();
    }
  } catch (e) { /* any failure → fall through to the desktop app */ }
})();
</script>
<title>STRYDE — Step Into Style &amp; Comfort</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
<style>
  :root{
    --stage:#050506;
    --panel-base:#0c0d10;
    --ink:#ffffff;
    --ink-soft:rgba(255,255,255,.74);
    --ink-faint:rgba(255,255,255,.46);
    --page-margin: clamp(16px, 4vw, 48px);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    height:100%; width:100%;
    overflow:hidden;
  }
  body{
    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
    background:var(--stage);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  #root{ height:100%; width:100%; }

  /* ===== Full-viewport stage — no fixed canvas, no shrinking ===== */
  .stage{
    position:fixed; inset:0;
    background:var(--stage);
    overflow:hidden;
    transition: background-color .6s ease;
  }

  /* ---------------- 2D image stage ---------------- */
  .canvas-mount{ position:absolute; inset:0; z-index:1; }
  .s2-bg{
    position:absolute; inset:-8%;
    background-size:cover; background-position:center;
    will-change:opacity;
  }
  /* per-product layer — full-stage box so the shoe wrap's % width resolves
     against the stage; the diagonal-slot transform (offset + scale + rotate)
     is applied here by stage2d. */
  .s2-layer{
    position:absolute; inset:0;
    transform-origin:center center;
    pointer-events:none;
    backface-visibility:hidden;
  }
  .s2-shoewrap{
    position:absolute; left:50%; top:47%;
    transform:translate(-50%,-50%);
    animation: s2float 6.5s ease-in-out infinite;
    will-change:transform;
  }
  @keyframes s2float{
    0%,100%{ transform:translate(-50%, calc(-50% - 7px)); }
    50%    { transform:translate(-50%, calc(-50% + 9px)); }
  }
  .s2-tilt{
    perspective:1700px;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.8,.3,1);
  }
  .s2-fit{ transform-origin:center center; }
  .s2-shoe{
    display:block; width:100%; height:auto;
    transform-origin:center 58%;
    -webkit-user-drag:none; user-select:none; pointer-events:none;
    will-change:transform, opacity;
  }
  .s2-shadow{ display:none; }

  /* legibility scrim over the artwork */
  .scrim{
    position:absolute; inset:0; z-index:5; pointer-events:none;
    background:
      linear-gradient(102deg, rgba(0,0,0,.6) 0%, rgba(0,0,0,.26) 30%, rgba(0,0,0,0) 56%),
      linear-gradient(0deg, rgba(0,0,0,.52) 0%, rgba(0,0,0,0) 30%),
      radial-gradient(125% 135% at 50% 44%, transparent 58%, rgba(0,0,0,.42) 100%);
  }

  /* ---------------- loader ---------------- */
  .loader{
    position:absolute; inset:0; z-index:40;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; background:var(--panel-base);
    transition:opacity .6s ease, visibility .6s;
  }
  .loader.gone{ opacity:0; visibility:hidden; }
  .loader-ring{
    width:46px; height:46px; border-radius:50%;
    border:3px solid rgba(255,255,255,.25);
    border-top-color:#fff; animation:spin 0.9s linear infinite;
  }
  .loader-text{ color:var(--ink-soft); font-size:14px; letter-spacing:.02em; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------------- top bar ---------------- */
  .topbar{
    position:absolute; z-index:20; top:0; left:0; right:0;
    height:auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:clamp(12px, 2.5vw, 24px) var(--page-margin);
  }
  .logo{ display:flex; align-items:center; gap:10px; }
  .logo-mark{ width:34px; height:30px; color:#fff; display:block; flex:none; }
  .logo-mark svg{ width:100%; height:100%; }
  .logo-word{ font-weight:800; font-size:clamp(14px, 1.6vw, 20px); letter-spacing:.16em; }

  .navpills{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    display:flex; align-items:center; gap:2px;
    background:rgba(0,0,0,.15);
    padding:5px; border-radius:999px;
  }
  .pill{
    border:0; background:transparent; cursor:pointer;
    color:var(--ink-soft); font-family:inherit; font-weight:600;
    font-size:clamp(11px, 1.1vw, 14px); padding:9px clamp(10px, 1.4vw, 18px); border-radius:999px;
    transition:.25s; white-space:nowrap;
  }
  .pill:hover{ color:#fff; }
  .pill.active{ background:#fff; color:#15151a; }

  .actions{ display:flex; align-items:center; gap:12px; }
  .iconbtn{
    position:relative; width:42px; height:42px; border-radius:50%;
    display:grid; place-items:center; cursor:pointer; color:#fff;
    background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.10);
    padding:0; outline:none;
    transition:.2s;
  }
  .iconbtn:hover{ background:rgba(0,0,0,.42); transform:translateY(-1px); }
  .iconbtn.cart{ background:#fff; border-color:transparent; }
  .badge{
    position:absolute; top:-4px; right:-4px;
    min-width:19px; height:19px; padding:0 5px; border-radius:999px;
    background:#fff; color:#15151a; font-size:11px; font-weight:800;
    display:grid; place-items:center; box-shadow:0 2px 6px rgba(0,0,0,.3);
  }

  /* ---------------- hero copy (left) ---------------- */
  .hero{
    position:absolute; z-index:15;
    left:var(--page-margin);
    top:50%;
    transform:translateY(-40%);
    width:clamp(220px, 28vw, 360px);
  }
  .headline{
    font-weight:300; line-height:1.0; letter-spacing:-.01em;
    font-size:clamp(24px, 3vw, 42px);
    color:#fff;
  }
  .subcopy{
    margin-top:clamp(12px, 1.6vh, 20px); color:var(--ink-soft);
    font-size:clamp(12px, 1.1vw, 14px); font-weight:500; line-height:1.5;
    max-width:225px; text-wrap:pretty;
  }
  .shopnow{
    margin-top:clamp(14px, 2vh, 24px); display:inline-flex; align-items:center; gap:14px;
    background:#fff; color:#1c1c1c; border:0; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:clamp(12px, 1.2vw, 15px);
    padding:8px 8px 8px 26px; border-radius:999px;
    box-shadow:0 14px 30px -10px rgba(0,0,0,.5);
    transition:.22s;
  }
  .shopnow:hover{ transform:translateY(-2px); box-shadow:0 20px 36px -12px rgba(0,0,0,.55); }
  .shop-arrow{
    width:36px; height:36px; border-radius:50%;
    background:#15151a; color:#fff; display:grid; place-items:center;
    flex:none;
  }

  /* ---------------- right price ---------------- */
  .price{
    text-align:right;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
  }
  .price-now{ font-weight:300; font-size:clamp(28px, 3.6vw, 48px); line-height:1;}
  .price-was{ margin-top:7px; color:var(--ink-faint); font-size:clamp(14px, 1.4vw, 18px); font-weight:300; text-decoration:line-through; }

  /* ---------------- dots ---------------- */
  .dots{
    position:absolute; z-index:16; left:50%;
    bottom:clamp(115px, 16vh, 150px);
    transform:translateX(-50%);
    display:flex; gap:9px;
    background:rgba(0,0,0,.22); padding:8px 12px; border-radius:999px;
  }
  .dot{
    width:8px; height:8px; border-radius:50%; border:0; cursor:pointer;
    background:rgba(255,255,255,.4); transition:.25s;
  }
  .dot.on{ width:22px; border-radius:999px; background:#fff; }

  /* ---------------- bottom bar (sizes + features + cart row) ---------------- */
  .bottom-bar{
    position:absolute; z-index:15;
    bottom:0; left:0; right:0;
    height:auto;
    display:flex; align-items:flex-end;
    justify-content:space-between;
    padding:clamp(12px, 2.5vw, 24px) var(--page-margin);
    gap:clamp(12px, 2vw, 32px);
    pointer-events:none;
  }
  .bottom-bar > *{ pointer-events:auto; }

  /* sizes — bottom left */
  .sizes{ flex:none; display:flex; flex-direction:column; gap:10px; }
  .sizes-label{ display:block; color:rgba(255,255,255,.55); font-size:13px; font-weight:600; }
  .size-row{ display:flex; gap:8px; }
  .size-chip{
    width:40px; height:40px; border-radius:50%; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:14px;
    color:rgba(255,255,255,.7); background:transparent;
    border:1px solid rgba(255,255,255,.28); transition:.2s;
  }
  .size-chip:hover{ border-color:#fff; color:#fff; }
  .size-chip.on{ background:#fff; color:#15151a; border-color:#fff; }

  /* right actions */
  .right-actions{ flex:none; display:flex; flex-direction:column; align-items:stretch; gap:14px; width:120px; }

  .arrows{ display:flex; gap:12px; width:100%; justify-content:space-between; }
  .arrowbtn{
    width:54px; height:54px; border-radius:50%; cursor:pointer;
    display:grid; place-items:center; color:#fff;
    background:transparent; border:1.5px solid rgba(255,255,255,.45);
    padding:0; outline:none; transition:.2s;
  }
  .arrowbtn:hover:not(:disabled){ background:rgba(255,255,255,.15); }
  .arrowbtn:disabled{ opacity:.35; cursor:default; }

  .stat-row{
    display:flex; align-items:center; gap:12px;
    color:#fff; font-size:clamp(13px, 1.3vw, 16px); font-weight:600;
  }
  .stat{ display:flex; align-items:center; gap:6px; }
  .stat-sep{ opacity:.4; font-weight:300; font-size:18px; }

  .qty-row{ display:flex; align-items:center; width:100%; justify-content:space-between; }
  .qty-row .arrowbtn{ width:38px; height:38px; flex:none; border-radius:14px; }
  .qty-val{ font-size:clamp(16px, 1.6vw, 20px); font-weight:600; color:#fff; min-width:24px; text-align:center; }

  .buynow{
    background:#fff; color:#1c1c1c; border:0; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:clamp(13px, 1.3vw, 16px);
    padding:14px 0; border-radius:999px;
    transition:.22s; white-space:nowrap;
    width:100%;
  }
  .buynow:hover{ transform:translateY(-2px); }
  .buynow.added{ background:#1f8a4c; color:#fff; }
  /* tweaks opener — fixed bottom-left, 2% opacity, fully out of layout flow */
  .gearbtn{ display:none; }

  /* drag hint */
  .drag-hint{
    position:absolute; z-index:15; left:50%; top:clamp(72px, 9.5vh, 120px);
    transform:translateX(-50%);
    color:var(--ink-faint); font-size:12px; letter-spacing:.04em;
    pointer-events:none; animation:hintfade 4s ease forwards 3.5s;
    white-space:nowrap;
  }
  @keyframes hintfade{ to{ opacity:0; } }

  .fade-key{ animation:fadeUp .5s ease both; }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:none; } }

  /* ===== Compact layout for narrow / short viewports ===== */
  @media (max-width: 640px) {
    .navpills { display:none; }
    .features { display:none; }
    .hero { width:clamp(180px, 52vw, 260px); }
    .sizes-label { display:none; }
    .bottom-bar { justify-content:space-between; }
    .right-actions { gap:8px; }
  }

  @media (max-height: 500px) {
    .features { display:none; }
    .dots { bottom:clamp(72px, 13vh, 100px); }
  }
  .twk-fab { display:none !important; }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- 2D image stage controller -->
  <script src="stage2d gradient.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
