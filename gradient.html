<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orange Gradient</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      /* Dark orange-red base, lighter salmon-orange radial glow in center */
      background: radial-gradient(
        ellipse 80% 75% at 50% 52%,
        #e8623c 0%,
        #d94e28 40%,
        #c13316 100%
      );
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body></body>
</html>
